<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Projem - Dashboard</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <h1>Web Projem</h1>
        <button id="theme-toggle" class="theme-btn">🌙 Mod Değiştir</button>
    </header>

    <main class="widget-container">
        
        <!-- HAVA DURUMU KARTI -->
        <section class="card">
            <div class="card-header">
                <span class="card-icon">☀️</span>
                <h3>Hava Durumu</h3>
            </div>
            <select id="city-select" class="modern-select">
                <option value="Adana">Adana</option>
                <option value="Ankara">Ankara</option>
                <option value="Antalya">Antalya</option>
                <option value="Bursa" selected>Bursa</option>
                <option value="Denizli">Denizli</option>
                <option value="Diyarbakır">Diyarbakır</option>
                <option value="Eskişehir">Eskişehir</option>
                <option value="Gaziantep">Gaziantep</option>
                <option value="Mersin">Mersin</option>
                <option value="İstanbul">İstanbul</option>
                <option value="İzmir">İzmir</option>
                <option value="Kocaeli">Kocaeli</option>
                <option value="Konya">Konya</option>
                <option value="Samsun">Samsun</option>
                <option value="Trabzon">Trabzon</option>
                <option value="Şanlıurfa">Şanlıurfa</option>
            </select>
            <div id="weather-text" class="result-display">Yükleniyor...</div>
        </section>

        <!-- DÖVİZ ÇEVİRİCİ KARTI -->
        <section class="card">
            <div class="card-header">
                <span class="card-icon">💱</span>
                <h3>Döviz Çevirici</h3>
            </div>
            <div class="currency-inputs">
                <input type="number" id="currency-amount" class="modern-input" value="1" min="1">
                <div class="select-group">
                    <select id="from-currency" class="modern-select small">
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                        <option value="GBP">GBP</option>
                    </select>
                    <span class="arrow">➔</span>
                    <select id="to-currency" class="modern-select small">
                        <option value="TRY" selected>TRY</option>
                        <option value="USD">USD</option>
                        <option value="EUR">EUR</option>
                    </select>
                </div>
            </div>
            <div id="currency-result" class="result-display">Hesaplanıyor...</div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
